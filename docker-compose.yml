services:
  postgres:
    image: postgres:16-alpine
    container_name: plateform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: plateform
      POSTGRES_PASSWORD: plateform
      POSTGRES_DB: plateform
    ports:
      - "5432:5432"
    volumes:
      - plateform-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plateform -d plateform"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  plateform-postgres:
